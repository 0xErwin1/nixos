[mcp_servers.aws]
command = "uvx"
args = ["awslabs.aws-documentation-mcp-server@latest"]

[mcp_servers.aws.env]
AWS_DOCUMENTATION_PARTITION = "aws"
FASTMCP_LOG_LEVEL = "ERROR"

[mcp_servers.dbflux]
command = "dbflux"
args = ["mcp", "--client-id", "grok"]

[mcp_servers.engram]
command = "engram"
args = ["mcp"]

[mcp_servers.obsidian]
command = "pnpx"
args = ["@mauricio.wolff/mcp-obsidian@latest", "/home/iperez/Atlas"]

[mcp_servers.atlas]
url = "https://atlas.iperez.dev/mcp"

[mcp_servers.atlas.headers]
Authorization = "Bearer @ATLAS_TOKEN@"

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.penpot]
url = "https://penpot.iperez.dev/mcp/stream?userToken=@PENPOT_API_KEY@"

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp_servers.context7.headers]
CONTEXT7_API_KEY = "@CONTEXT7_API_KEY@"
